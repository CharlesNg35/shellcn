# Copy to config.yaml and adjust for your environment.

server:
  addr: ":8081"
  log_level: info
  # log_file: /var/log/shellcn.log  # default: stdout; rotated by size automatically
  access_log: true # one log line per API request

auth:
  session_ttl: 24h
  # If empty, derives the signing key from the master key
  jwt_secret: ""

bootstrap:
  # Leave admin_password empty to print a
  # generated one-time initial password on first startup.
  admin_username: admin
  admin_password: ""

database:
  driver: sqlite
  dsn: shellcn.db
  # driver: postgres
  # dsn: host=localhost user=shellcn password=secret dbname=shellcn port=5432 sslmode=disable
  # driver: mysql
  # dsn: shellcn:secret@tcp(localhost:3306)/shellcn?charset=utf8mb4&parseTime=True&loc=Local

secrets:
  master_key: ""
  master_key_file: ""

email:
  enabled: false
  host: smtp.example.com
  port: 587
  from: "ShellCN <shellcn@example.com>"
  username: shellcn@example.com
  password: ""
  use_tls: false

audit:
  enabled: true
  retention_days: 0
  cleanup_interval: 1h

cluster:
  lease_ttl: 15s
  renew_interval: 5s

# Shared AI is optional. Supported kinds: openrouter, openai, anthropic, google,
# openai_compatible. Users can also add personal providers in Settings.
# ai:
#   kind: openrouter
#   name: Shared OpenRouter
#   api_key: sk-or-v1-example
#   model: openai/gpt-4o
#   base_url: ""

# OpenAI-compatible example.
# ai:
#   kind: openai_compatible
#   name: Shared Local AI
#   base_url: http://127.0.0.1:11434/v1
#   api_key: ollama
#   model: llama3.1:8b

recordings:
  dir: recordings
  retention_days: 0
  cleanup_interval: 1h
  max_chunk_bytes: 8388608
