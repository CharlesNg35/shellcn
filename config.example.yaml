# ShellCN example configuration.
# Copy to config.yaml for local development, or to config/config.yaml if you
# prefer keeping runtime config under a config directory.

server:
  addr: ":8081"
  log_level: info

auth:
  session_ttl: 24h
  # Optional stable JWT signing secret. If empty, ShellCN derives the signing key
  # from the master key
  jwt_secret: ""

bootstrap:
  # Used only when the user table is empty. Leave admin_password empty to print a
  # generated one-time initial password on first startup.
  admin_username: admin
  admin_password: ""

database:
  # driver: sqlite (default) | postgres | mysql
  driver: sqlite
  # sqlite: a file path. postgres/mysql: a connection DSN, for example:
  #   postgres: host=localhost user=shellcn password=secret dbname=shellcn port=5432 sslmode=disable
  #   mysql:    shellcn:secret@tcp(localhost:3306)/shellcn?charset=utf8mb4&parseTime=True&loc=Local
  dsn: shellcn.db

secrets:
  # Production must set a stable 32-byte base64 key via this field,
  # SHELLCN_MASTER_KEY, or SHELLCN_MASTER_KEY_FILE.
  master_key: ""
  master_key_file: ""

email:
  enabled: false
  host: ""
  port: 587
  from: ""
  username: ""
  password: ""
  use_tls: false

recordings:
  dir: recordings
  retention_days: 0
  cleanup_interval: 1h
  max_chunk_bytes: 8388608
