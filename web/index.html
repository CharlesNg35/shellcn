<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShellCN</title>
    <!-- Render-blocking splash styles: present at first paint in dev and prod
         (the bundled app CSS is injected too late in dev to style the splash). -->
    <link rel="stylesheet" href="/boot.css" />
    <!-- Apply the stored/system theme before first paint so neither the splash
         nor the app flashes the wrong scheme (mirrors useTheme's logic). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("shellcn.theme");
          var dark =
            t === "dark" ||
            (t !== "light" &&
              window.matchMedia &&
              matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="app">
      <!-- Pre-mount splash: shown until Vue mounts and replaces #app, so the SPA
           never flashes a blank page on first load. -->
      <div id="boot-splash">
        <div class="boot-mark" aria-hidden="true">
          <svg
            width="44"
            height="44"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="32" height="32" rx="6" fill="currentColor" />
            <g transform="translate(16 16)">
              <path
                d="M3 -6Q6 -6 6 -3Q6 0 3 0H-3Q-6 0 -6 3Q-6 6 -3 6H3"
                stroke="#fff"
                stroke-width="2"
                stroke-linecap="round"
                fill="none"
              />
              <path
                d="M-5 -5L-3.5 -3.5L-5 -2"
                stroke="#fff"
                stroke-width="1"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </g>
          </svg>
        </div>
        <div class="boot-spin" role="status" aria-label="Loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
