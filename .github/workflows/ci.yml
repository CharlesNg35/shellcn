name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: pnpm -C web install --frozen-lockfile
      - run: pnpm -C web build
      - run: go build ./...
      - run: go test -race ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm -C web install --frozen-lockfile
      - run: pnpm -C web lint
      - run: pnpm -C web type-check
      - run: pnpm -C web test:unit
      - run: pnpm -C web exec playwright install --with-deps chromium
      - run: pnpm -C web build
      - run: pnpm -C web test:e2e
