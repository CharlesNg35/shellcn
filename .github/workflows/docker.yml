name: Docker Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "server=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"
          echo "agent=ghcr.io/${repo}-agent" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cmd/server/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.server }}:latest

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cmd/agent/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.agent }}:latest
